{% extends 'base.html' %}

{% block title %}Удалить поставщика — Зоомагазин{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem"></i>
                <h3 class="mt-3">Удалить поставщика?</h3>
                <p class="text-muted">Вы уверены что хотите удалить поставщика:</p>
                <p class="fw-bold fs-5">{{ supplier.name }}</p>
                <p class="text-muted">{{ supplier.phone }}</p>

                <form method="post" class="d-flex gap-2 justify-content-center mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Да, удалить
                    </button>
                    <a href="/suppliers/" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i> Отмена
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
